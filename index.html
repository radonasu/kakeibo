<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>家族家計簿</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="家計簿">
  <!-- iOS Touch Icons -->
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <!-- iOS Splash Screens -->
  <link rel="apple-touch-startup-image" href="icons/splash-750x1334.png"
    media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="icons/splash-1125x2436.png"
    media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="icons/splash-828x1792.png"
    media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="icons/splash-1170x2532.png"
    media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">

  <!-- ダークモード FOUC防止（CSS読み込み前に即時適用） -->
  <script>
    (function(){
      var t = localStorage.getItem('kakeibo-theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="css/style.css?v=5.14">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Supabase SDK（クラウド同期・認証用） -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div id="app">

  <!-- ─── サイドバー ─── -->
  <nav id="sidebar">
    <div id="sidebar-brand">
      <div class="brand-row">
        <div class="brand-icon">💰</div>
        <span class="brand-name">家族家計簿</span>
        <button class="btn-dark-toggle" id="dark-toggle-side" title="ダークモード切替">🌙</button>
      </div>
      <!-- アカウント切替バー（JSで描画） -->
      <div id="account-bar"></div>
    </div>

    <div id="sidebar-nav">
      <button class="nav-item active" data-page="dashboard">
        <span class="nav-icon">🏠</span> ダッシュボード
      </button>
      <button class="nav-item" data-page="transactions">
        <span class="nav-icon">📋</span> 収支一覧
      </button>
      <button class="nav-item" data-page="reports">
        <span class="nav-icon">📊</span> レポート
      </button>
      <button class="nav-item" data-page="categories">
        <span class="nav-icon">🏷️</span> カテゴリ
      </button>
      <button class="nav-item" data-page="settings">
        <span class="nav-icon">⚙️</span> 設定
      </button>
    </div>

    <!-- ユーザー情報（JSで描画） -->
    <div id="sidebar-footer" class="sidebar-footer"></div>
  </nav>

  <!-- ─── メインエリア ─── -->
  <div id="main-wrapper">

    <header id="mobile-header">
      <button id="hamburger">☰</button>
      <span id="mobile-title">家族家計簿</span>
      <!-- クラウド同期ステータスインジケーター -->
      <span id="sync-status-dot-header" class="header-sync-dot" title="クラウド同期: 未接続"></span>
      <button class="btn-dark-toggle" id="dark-toggle-mobile" title="ダークモード切替">🌙</button>
    </header>

    <main id="main-content">
      <p style="color:#64748b;padding:40px;text-align:center">読み込み中...</p>
    </main>

  </div>

  <!-- ─── グローバルFAB（全ページ共通・クイック追加） ─── -->
  <button id="global-fab" title="収支を追加">＋</button>

  <!-- ─── ボトムナビ（モバイル） ─── -->
  <nav id="bottom-nav">
    <button class="bottom-nav-item active" data-page="dashboard">
      <span class="bottom-nav-icon">🏠</span>
      <span class="bottom-nav-label">ホーム</span>
    </button>
    <button class="bottom-nav-item" data-page="transactions">
      <span class="bottom-nav-icon">📋</span>
      <span class="bottom-nav-label">収支</span>
    </button>
    <button class="bottom-nav-item" data-page="reports">
      <span class="bottom-nav-icon">📊</span>
      <span class="bottom-nav-label">レポート</span>
    </button>
    <button class="bottom-nav-item" data-page="categories">
      <span class="bottom-nav-icon">🏷️</span>
      <span class="bottom-nav-label">カテゴリ</span>
    </button>
    <button class="bottom-nav-item" data-page="settings">
      <span class="bottom-nav-icon">⚙️</span>
      <span class="bottom-nav-label">設定</span>
    </button>
  </nav>
</div>

<!-- JS: 読み込み順序が重要 -->
<script src="js/config.js?v=5.14"></script>
<script src="js/data.js?v=5.14"></script>
<script src="js/export.js?v=5.14"></script>
<script src="js/charts.js?v=5.14"></script>
<script src="js/sync.js?v=5.14"></script>
<script src="js/app.js?v=5.14"></script>
<!-- PWA: インストール促進・更新通知・オフライン表示・SW登録 -->
<script src="js/pwa.js?v=5.14"></script>

</body>
</html>
