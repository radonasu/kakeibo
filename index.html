<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>家族家計簿</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="家計簿">
  <!-- iOS Touch Icons -->
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <!-- iOS Splash Screens -->
  <link rel="apple-touch-startup-image" href="icons/splash-750x1334.png"
    media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="icons/splash-1125x2436.png"
    media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="icons/splash-828x1792.png"
    media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="icons/splash-1170x2532.png"
    media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">

  <!-- ダークモード FOUC防止（CSS読み込み前に即時適用） -->
  <script>
    (function(){
      var t = localStorage.getItem('kakeibo-theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="css/style.css?v=19.20">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Supabase SDK（クラウド同期・認証用） -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div id="app">

  <!-- ─── サイドバー ─── -->
  <nav id="sidebar" aria-label="メインナビゲーション">
    <div id="sidebar-brand">
      <div class="brand-row">
        <div class="brand-icon" aria-hidden="true">💰</div>
        <span class="brand-name">家族家計簿</span>
        <button class="btn-dark-toggle" id="dark-toggle-side" title="ダークモード切替" aria-label="ダークモード切替">🌙</button>
      </div>
      <!-- アカウント切替バー（JSで描画） -->
      <div id="account-bar" role="group" aria-label="アカウント切替"></div>
    </div>

    <div id="sidebar-nav" role="group" aria-label="ページナビゲーション">
      <button class="nav-item active" data-page="dashboard">
        <span class="nav-icon" aria-hidden="true">🏠</span> ダッシュボード
      </button>
      <button class="nav-item" data-page="transactions">
        <span class="nav-icon" aria-hidden="true">📋</span> 収支一覧
      </button>
      <button class="nav-item" data-page="reports">
        <span class="nav-icon" aria-hidden="true">📊</span> レポート
      </button>
      <button class="nav-item" data-page="categories">
        <span class="nav-icon" aria-hidden="true">🏷️</span> カテゴリ
      </button>
      <button class="nav-item" data-page="assets">
        <span class="nav-icon" aria-hidden="true">🏦</span> 資産管理
      </button>
      <button class="nav-item" data-page="goals">
        <span class="nav-icon" aria-hidden="true">🎯</span> 貯蓄目標
      </button>
      <button class="nav-item" data-page="calendar">
        <span class="nav-icon" aria-hidden="true">📅</span> カレンダー
      </button>
      <button class="nav-item" data-page="subscriptions">
        <span class="nav-icon" aria-hidden="true">📱</span> サブスク管理
      </button>
      <button class="nav-item" data-page="points">
        <span class="nav-icon" aria-hidden="true">🎫</span> ポイント管理
      </button>
      <button class="nav-item" data-page="wishlist">
        <span class="nav-icon" aria-hidden="true">🛍️</span> ほしいもの
      </button>
      <button class="nav-item" data-page="challenges">
        <span class="nav-icon" aria-hidden="true">🏆</span> 節約チャレンジ
      </button>
      <button class="nav-item" data-page="debts">
        <span class="nav-icon" aria-hidden="true">💳</span> ローン管理
      </button>
      <button class="nav-item" data-page="events">
        <span class="nav-icon" aria-hidden="true">📌</span> 収支予定
      </button>
      <button class="nav-item" data-page="settings">
        <span class="nav-icon" aria-hidden="true">⚙️</span> 設定
      </button>
    </div>

    <!-- ユーザー情報（JSで描画） -->
    <div id="sidebar-footer" class="sidebar-footer"></div>
  </nav>

  <!-- サイドバーオーバーレイ（モバイル：タップで閉じる）-->
  <div id="sidebar-overlay" role="presentation" aria-hidden="true"></div>

  <!-- ─── メインエリア ─── -->
  <div id="main-wrapper">

    <header id="mobile-header" role="banner">
      <button id="hamburger" aria-label="メニューを開く" aria-expanded="false" aria-controls="sidebar">☰</button>
      <span id="mobile-title">家族家計簿</span>
      <!-- クラウド同期ステータスインジケーター -->
      <span id="sync-status-dot-header" class="header-sync-dot" title="クラウド同期: 未接続" role="status" aria-label="クラウド同期: 未接続"></span>
      <!-- 通知センターベルボタン (v6.8) -->
      <button class="btn-notif-bell" id="notif-bell-btn" title="通知センター" aria-label="通知センター" aria-haspopup="true" aria-expanded="false">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-bell-badge" id="notif-bell-badge" aria-label="未読通知件数" style="display:none"></span>
      </button>
      <button class="btn-dark-toggle" id="dark-toggle-mobile" title="ダークモード切替" aria-label="ダークモード切替">🌙</button>
    </header>

    <!-- 通知センターパネル (v6.8) -->
    <div id="notif-panel" class="notif-panel" role="dialog" aria-modal="false" aria-label="通知センター" style="display:none">
      <div class="notif-panel-header">
        <span class="notif-panel-title">🔔 通知センター</span>
        <button class="notif-mark-read" id="notif-mark-read-btn" title="全て既読にする" aria-label="全て既読にする">全て既読</button>
      </div>
      <div class="notif-panel-body" id="notif-panel-body">
        <!-- JSで描画 -->
      </div>
      <div class="notif-panel-footer" id="notif-panel-footer"></div>
    </div>
    <div id="notif-overlay" class="notif-overlay" aria-hidden="true" style="display:none"></div>

    <main id="main-content" role="main">
      <!-- スケルトンローディング（JS初期化前に表示）v5.24 -->
      <div class="sk-header">
        <div class="sk-bone sk-bone-title" style="width:180px"></div>
        <div class="sk-header-btns">
          <div class="sk-bone sk-bone-btn sk-d1" style="width:80px"></div>
          <div class="sk-bone sk-bone-btn sk-d2" style="width:100px"></div>
        </div>
      </div>
      <div class="sk-summary-grid">
        <div class="sk-bone sk-bone-sum"></div>
        <div class="sk-bone sk-bone-sum sk-d1"></div>
        <div class="sk-bone sk-bone-sum sk-d2"></div>
      </div>
      <div class="sk-card">
        <div class="sk-bone sk-bone-sec" style="width:140px"></div>
        <div class="sk-bone sk-bone-chart sk-d1"></div>
      </div>
      <div class="sk-card">
        <div class="sk-bone sk-bone-sec" style="width:160px"></div>
        <div class="sk-bone sk-bone-row sk-d1"></div>
        <div class="sk-bone sk-bone-row sk-d2"></div>
        <div class="sk-bone sk-bone-row sk-d3"></div>
        <div class="sk-bone sk-bone-row sk-d4"></div>
        <div class="sk-bone sk-bone-row-last sk-d5"></div>
      </div>
    </main>

  </div>

  <!-- ─── 一括操作バー（#main-content外に配置: transformの影響を受けないため） ─── -->
  <div id="bulk-bar"></div>

  <!-- ─── グローバルFAB（全ページ共通・クイック追加） v8.5: SVGアイコン化 ─── -->
  <button id="global-fab" title="収支を追加" aria-label="収支を追加">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- ─── ボトムナビ（モバイル）v8.5: SVGアイコン化・5アイテム整理 ─── -->
  <nav id="bottom-nav" aria-label="モバイルナビゲーション">
    <button class="bottom-nav-item active" data-page="dashboard" aria-label="ダッシュボード">
      <span class="bottom-nav-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </span>
      <span class="bottom-nav-label">ホーム</span>
    </button>
    <button class="bottom-nav-item" data-page="transactions" aria-label="収支一覧">
      <span class="bottom-nav-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      </span>
      <span class="bottom-nav-label">収支</span>
    </button>
    <button class="bottom-nav-item" data-page="reports" aria-label="レポート">
      <span class="bottom-nav-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
      </span>
      <span class="bottom-nav-label">レポート</span>
    </button>
    <button class="bottom-nav-item" data-page="categories" aria-label="カテゴリ">
      <span class="bottom-nav-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      </span>
      <span class="bottom-nav-label">カテゴリ</span>
    </button>
    <button class="bottom-nav-item" data-page="settings" aria-label="設定">
      <span class="bottom-nav-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </span>
      <span class="bottom-nav-label">設定</span>
    </button>
  </nav>
</div>

<!-- ─── 繰り返し取引 確認モーダル (v7.7) ─── -->
<div id="rc-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="rc-title">
  <div class="modal-wrap rc-wrap">
    <div class="rc-header">
      <div class="rc-header-top">
        <span class="rc-header-icon">🔁</span>
        <div>
          <h2 class="rc-title" id="rc-title">今月の繰り返し取引</h2>
          <p class="rc-sub">追加する取引を選んでください</p>
        </div>
      </div>
      <button class="rc-close" id="rc-close-btn" aria-label="閉じる">✕</button>
    </div>
    <div class="rc-body" id="rc-body"></div>
    <div class="rc-footer">
      <button class="btn btn-ghost rc-skip-btn" id="rc-skip-btn">今月はスキップ</button>
      <button class="btn btn-primary rc-ok-btn" id="rc-ok-btn">追加する</button>
    </div>
  </div>
</div>

<!-- ─── 月初チェックインモーダル (v6.6) ─── -->
<div id="checkin-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="ci-title">
  <div class="modal-wrap ci-wrap">
    <div class="ci-header">
      <div class="ci-header-inner">
        <div class="ci-month-badge" id="ci-month-badge"></div>
        <h2 class="ci-title" id="ci-title"></h2>
        <p class="ci-sub" id="ci-sub"></p>
      </div>
      <button class="ci-close" id="ci-close-btn" aria-label="閉じる">✕</button>
    </div>
    <div class="ci-body" id="ci-body"></div>
    <div class="ci-footer">
      <button class="btn btn-primary ci-ok-btn" id="ci-ok-btn">今月もがんばろう！</button>
    </div>
  </div>
</div>

<!-- ─── 収支予定モーダル（v5.90）─── -->
<div id="ev-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="ev-modal-title">
  <div class="modal-wrap">
    <div class="modal-header">
      <h2 class="modal-title" id="ev-modal-title">収支予定を追加</h2>
      <button class="modal-close" onclick="closeEventModal()" aria-label="閉じる">✕</button>
    </div>
    <form id="ev-form" onsubmit="event.preventDefault(); saveEventForm();">
      <input type="hidden" id="ev-id">
      <input type="hidden" id="ev-emoji-selected" value="📅">
      <input type="hidden" id="ev-color-selected" value="#6366f1">

      <div class="form-group">
        <label>名前</label>
        <input type="text" id="ev-name" placeholder="例: 夏休み旅行" maxlength="40" required>
      </div>

      <div class="form-group">
        <label>絵文字</label>
        <div class="ev-emoji-row">
          <span class="ev-emoji-preview-box" id="ev-emoji-preview">📅</span>
          <div id="ev-emoji-grid" class="ev-emoji-grid"></div>
        </div>
      </div>

      <div class="form-group">
        <label>カラー</label>
        <div id="ev-color-swatches" class="color-swatch-row"></div>
      </div>

      <div class="form-group">
        <label>種別</label>
        <div class="type-toggle">
          <label><input type="radio" id="ev-type-expense" name="ev-type" value="expense"> 支出</label>
          <label><input type="radio" id="ev-type-income"  name="ev-type" value="income">  収入</label>
        </div>
      </div>

      <div class="form-group">
        <label>予定金額</label>
        <div class="amount-input-wrap">
          <span class="amount-prefix">¥</span>
          <input type="number" id="ev-amount" placeholder="0" min="0">
        </div>
      </div>

      <div class="form-group">
        <label>予定月</label>
        <input type="month" id="ev-month">
      </div>

      <div class="form-group">
        <label>カテゴリ</label>
        <select id="ev-cat"><option value="">カテゴリなし</option></select>
      </div>

      <div class="form-group">
        <label>メモ</label>
        <input type="text" id="ev-memo" placeholder="任意のメモ" maxlength="100">
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeEventModal()">キャンセル</button>
        <button type="submit" class="btn btn-primary">保存</button>
      </div>
    </form>
  </div>
</div>

<!-- ─── キーボードショートカットヘルプモーダル (v7.9) ─── -->
<div id="kb-help-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="kb-help-title">
  <div class="modal-wrap kb-help-wrap">
    <div class="modal-header">
      <h2 class="modal-title" id="kb-help-title">⌨️ キーボードショートカット</h2>
      <button class="modal-close" id="kb-help-close" aria-label="閉じる">✕</button>
    </div>
    <div class="kb-help-body">
      <div class="kb-group">
        <div class="kb-group-title">取引</div>
        <div class="kb-row"><div class="kb-keys"><kbd>N</kbd></div><span>新規取引を追加</span></div>
        <div class="kb-row"><div class="kb-keys"><kbd>/</kbd></div><span>取引を検索</span></div>
      </div>
      <div class="kb-group">
        <div class="kb-group-title">ナビゲーション</div>
        <div class="kb-row"><div class="kb-keys"><kbd>G</kbd><kbd>D</kbd></div><span>ダッシュボード</span></div>
        <div class="kb-row"><div class="kb-keys"><kbd>G</kbd><kbd>T</kbd></div><span>取引一覧</span></div>
        <div class="kb-row"><div class="kb-keys"><kbd>G</kbd><kbd>R</kbd></div><span>レポート</span></div>
        <div class="kb-row"><div class="kb-keys"><kbd>G</kbd><kbd>C</kbd></div><span>カレンダー</span></div>
        <div class="kb-row"><div class="kb-keys"><kbd>G</kbd><kbd>S</kbd></div><span>設定</span></div>
        <div class="kb-row"><div class="kb-keys"><kbd>G</kbd><kbd>A</kbd></div><span>資産管理</span></div>
      </div>
      <div class="kb-group">
        <div class="kb-group-title">その他</div>
        <div class="kb-row"><div class="kb-keys"><kbd>?</kbd></div><span>このヘルプを表示</span></div>
        <div class="kb-row"><div class="kb-keys"><kbd>Esc</kbd></div><span>モーダルを閉じる</span></div>
      </div>
    </div>
  </div>
</div>
<!-- グラフ ドリルダウンモーダル (v8.0) -->
<div id="dd-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="dd-modal-title">
  <div class="modal-box dd-modal-box">
    <div class="modal-header dd-modal-header">
      <div class="dd-cat-info">
        <span class="dd-cat-dot" id="dd-cat-dot" aria-hidden="true"></span>
        <h2 class="modal-title" id="dd-modal-title"></h2>
      </div>
      <button class="modal-close" id="dd-modal-close" aria-label="閉じる">✕</button>
    </div>
    <div class="dd-summary" id="dd-summary"></div>
    <div class="dd-list" id="dd-list"></div>
    <div class="modal-footer dd-modal-footer">
      <button class="btn btn-ghost" id="dd-modal-close2">閉じる</button>
      <button class="btn btn-primary" id="dd-add-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        このカテゴリで追加
      </button>
    </div>
  </div>
</div>
<!-- 月ドリルダウンモーダル (v8.6) -->
<div id="md-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="md-modal-title">
  <div class="modal-box md-modal-box">
    <div class="modal-header dd-modal-header">
      <div class="md-month-nav">
        <button class="md-nav-btn" id="md-prev-btn" aria-label="前月">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="md-month-info">
          <span class="md-calendar-icon" aria-hidden="true">📅</span>
          <h2 class="modal-title" id="md-modal-title"></h2>
        </div>
        <button class="md-nav-btn" id="md-next-btn" aria-label="翌月">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
